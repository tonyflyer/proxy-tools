# =============================================================================
# SSH 隧道统一配置 — 所有服务器和隧道
# =============================================================================

servers:
  # ─── 一桩科技云服务器 (跳板机) ─────────────────────────────────
  yizhao:
    ssh_server: 172.96.254.246
    ssh_port: 27959
    ssh_user: zt
    ssh_key: ~/.ssh/id_ed25519_m4_to_yizhao
    vpn_interface: utun4
    autossh_poll: 10

  # ─── DevOps 环境 (Mac Studio 02) ──────────────────────────────
  devops:
    ssh_server: 172.22.164.60
    ssh_port: 22
    ssh_user: zhangtony
    ssh_key: ~/.ssh/id_ed25519_m4_to_yizhao
    autossh_poll: 30

tunnels:
  # ─── yizhao: AI API ────────────────────────────────────────────
  - name: ai-api
    server: yizhao
    type: remote
    local_port: 11436
    remote_host: 127.0.0.1
    remote_port: 11436
    description: AI API LLM Proxy

  # ─── yizhao: 实验室内部服务 ─────────────────────────────────────
  - name: lab-redmine
    server: yizhao
    type: remote
    local_port: 18200
    remote_host: 172.22.164.35
    remote_port: 80
    description: Lab Redmine

  - name: lab-gitlab
    server: yizhao
    type: remote
    local_port: 18201
    remote_host: 172.22.164.35
    remote_port: 8080
    description: Lab GitLab

  # ─── yizhao: DevOps 环境转发 ────────────────────────────────────
  - name: redmine
    server: yizhao
    type: remote
    local_port: 18014
    remote_host: 127.0.0.1
    remote_port: 18014
    description: Redmine

  - name: zentao
    server: yizhao
    type: remote
    local_port: 18015
    remote_host: 127.0.0.1
    remote_port: 18015
    description: ZenTao

  - name: gitlab
    server: yizhao
    type: remote
    local_port: 18012
    remote_host: 127.0.0.1
    remote_port: 18012
    description: GitLab

  - name: jenkins
    server: yizhao
    type: remote
    local_port: 18013
    remote_host: 127.0.0.1
    remote_port: 18013
    description: Jenkins

  - name: mailpit
    server: yizhao
    type: remote
    local_port: 18016
    remote_host: 127.0.0.1
    remote_port: 18016
    description: Mailpit

  - name: extra-port
    server: yizhao
    type: remote
    local_port: 18017
    remote_host: 127.0.0.1
    remote_port: 18017
    description: Extra port

  # ─── yizhao: 本地代理 (Local Forward) ──────────────────────────
  - name: local-proxy-localhost
    server: yizhao
    type: local
    bind_address: 127.0.0.1
    bind_port: 4001
    remote_host: 127.0.0.1
    remote_port: 8888
    description: 本地代理 (localhost)

  - name: local-proxy-lan
    server: yizhao
    type: local
    bind_address: 192.168.2.1
    bind_port: 4001
    remote_host: 127.0.0.1
    remote_port: 8888
    description: 本地代理 (LAN)

  # ─── devops: CodeForge 反向隧道 ─────────────────────────────────
  - name: codeforge-api
    server: devops
    type: remote
    local_port: 18440
    remote_host: 127.0.0.1
    remote_port: 18440
    description: CodeForge API (webhook receiver)

  - name: codeforge-ws
    server: devops
    type: remote
    local_port: 18441
    remote_host: 127.0.0.1
    remote_port: 18441
    description: CodeForge WebSocket

  - name: codeforge-dashboard
    server: devops
    type: remote
    local_port: 18443
    remote_host: 127.0.0.1
    remote_port: 18443
    description: CodeForge Dashboard

settings:
  check_interval: 30
  autossh_gatetime: 0
