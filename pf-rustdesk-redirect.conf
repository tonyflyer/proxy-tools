# pf-rustdesk-redirect.conf
# Redirect RustDesk traffic to chisel tunnel WITHOUT lo0 alias
#
# Problem: RustDesk server returns relay = 172.22.164.60:21117
#          Client tries to connect directly, but traffic is blocked
#          Need to redirect to localhost:21117 (chisel tunnel)
#
# Solution: Intercept packets on VPN interface, redirect to localhost,
#           force delivery through loopback via route-to
#
# NOTE: VPN_INTERFACE must match your actual VPN interface.
#       Common values: utun4, utun5, utun6
#       Check with: ifconfig | grep utun
#
# Architecture:
#   RustDesk -> 172.22.164.60:21117 (out VPN interface)
#   pf rdr intercepts -> 127.0.0.1:21117
#   route-to lo0 forces delivery through loopback
#   chisel tunnel receives on 127.0.0.1:21117
#
# Port 8080 (chisel server) is NOT redirected - chisel can still reach server

VPN_INTERFACE = "utun6"

# ============================================================
# STEP 1: rdr - Intercept outgoing packets on VPN interface
# Rewrite destination from 172.22.164.60 -> 127.0.0.1
# This only affects ports 21115-21119, NOT port 8080
# ============================================================

# TCP rules (control/signaling)
rdr pass on $VPN_INTERFACE proto tcp from any to 172.22.164.60 port 21115 -> 127.0.0.1 port 21115
rdr pass on $VPN_INTERFACE proto tcp from any to 172.22.164.60 port 21116 -> 127.0.0.1 port 21116
rdr pass on $VPN_INTERFACE proto tcp from any to 172.22.164.60 port 21117 -> 127.0.0.1 port 21117
rdr pass on $VPN_INTERFACE proto tcp from any to 172.22.164.60 port 21118 -> 127.0.0.1 port 21118
rdr pass on $VPN_INTERFACE proto tcp from any to 172.22.164.60 port 21119 -> 127.0.0.1 port 21119

# UDP rules (RustDesk uses UDP 21116 for signaling)
rdr pass on $VPN_INTERFACE proto udp from any to 172.22.164.60 port 21115 -> 127.0.0.1 port 21115
rdr pass on $VPN_INTERFACE proto udp from any to 172.22.164.60 port 21116 -> 127.0.0.1 port 21116
rdr pass on $VPN_INTERFACE proto udp from any to 172.22.164.60 port 21117 -> 127.0.0.1 port 21117
rdr pass on $VPN_INTERFACE proto udp from any to 172.22.164.60 port 21118 -> 127.0.0.1 port 21118
rdr pass on $VPN_INTERFACE proto udp from any to 172.22.164.60 port 21119 -> 127.0.0.1 port 21119

# ============================================================
# STEP 2: route-to - Force rewritten packets through lo0
# After rdr changes dest to 127.0.0.1, the kernel routing
# table still "knows" the original dest was 172.22.164.60.
# route-to lo0 overrides the routing decision and forces
# delivery through the loopback interface.
# ============================================================

pass out on $VPN_INTERFACE route-to lo0 proto tcp from any to 172.22.164.60 port {21115, 21116, 21117, 21118, 21119}
pass out on $VPN_INTERFACE route-to lo0 proto udp from any to 172.22.164.60 port {21115, 21116, 21117, 21118, 21119}

# ============================================================
# STEP 3: Allow loopback traffic
# ============================================================

pass in quick on lo0